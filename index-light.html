<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="color-scheme" content="dark light">
  <title>GetMyInvoices Header — Light</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="light">

  <!--
    ═══════════════════════════════════════════════════════════════════════════
    GetMyInvoices Website Header — LIGHT variant
    ───────────────────────────────────────────────────────────────────────────
    Structurally identical to index.html (Dark). The differences:

      ─ <body class="light"> activates the light theme tokens in style.css
        (--bg-page becomes white).
      ─ Phone background, center circle, portal box inner: WHITE fill instead
        of dark/gradient.
      ─ All strokes use #dde1ea (soft blue-grey) instead of #3c6e9d.
      ─ The two inline arrows between boxes are replaced with the polished
        external SVG (assets/light/arrow.svg).
      ─ Invoice slips, sync bubbles, and the 3 phone logos (Lexware, Addison,
        FastBill) use their LIGHT variants from /assets/light/.
      ─ DATEV phone logo + DHL logo + 8 portal logos are shared (/assets/common/).

    The animation logic in script.js is shared with the Dark variant.
    For full project overview see README.md.
    ═══════════════════════════════════════════════════════════════════════════
  -->

  <div class="header-graphic">

    <!-- ═══════════════════════════════════════════════════════════════════
         INLINE SVG — static composition of the three regions
         viewBox 824 × 344 matches the original design canvas.
         ═══════════════════════════════════════════════════════════════════ -->
    <svg class="bg-svg" viewBox="0 0 824.38 344"
         xmlns="http://www.w3.org/2000/svg" aria-hidden="true">

      <defs>
        <!--
          Gradient is defined for compatibility with the SVG structure but
          is NOT used in the light variant (kept here so dark/light SVGs
          stay structurally identical for easier maintenance).
        -->
        <linearGradient id="bgGradient" x1="0" y1="0" x2="1" y2="1">
          <stop offset="0%"   stop-color="#000000"/>
          <stop offset="24%"  stop-color="#082540"/>
          <stop offset="46%"  stop-color="#082540"/>
          <stop offset="100%" stop-color="#000000"/>
        </linearGradient>

        <!-- Standard cyan glow — for phone, center circle, inner DHL box -->
        <filter id="cyanGlow" x="-50%" y="-50%" width="200%" height="200%">
          <feGaussianBlur in="SourceAlpha" stdDeviation="12" result="blur"/>
          <feFlood flood-color="#44A4DC" flood-opacity="0.95" result="color"/>
          <feComposite in="color" in2="blur" operator="in" result="coloredBlur"/>
          <feMerge>
            <feMergeNode in="coloredBlur"/>
            <feMergeNode in="SourceGraphic"/>
          </feMerge>
        </filter>

        <!-- Stronger cyan glow — for the two sync bubbles -->
        <filter id="cyanGlowStrong" x="-100%" y="-100%" width="300%" height="300%">
          <feGaussianBlur in="SourceAlpha" stdDeviation="18" result="blur"/>
          <feFlood flood-color="#44A4DC" flood-opacity="1" result="color"/>
          <feComposite in="color" in2="blur" operator="in" result="coloredBlur"/>
          <feMerge>
            <feMergeNode in="coloredBlur"/>
            <feMergeNode in="SourceGraphic"/>
          </feMerge>
        </filter>
      </defs>

      <!-- RIGHT: smartphone background — WHITE fill, soft stroke -->
      <g filter="url(#cyanGlow)">
        <rect x="640.54" y="55.31" width="137.67" height="236.53"
              rx="11.29" ry="11.29"
              fill="#ffffff" stroke="#dde1ea" stroke-width="2.85"/>
      </g>

      <!--
        Inline arrow #1: Portal box → Center circle
        Light variant uses the polished external arrow.
        Positioned so the shaft's left edge aligns with the portal box border.
      -->
      <image href="assets/light/arrow.svg"
             x="291.85" y="158.95" width="41.82" height="21.91"/>

      <!-- Inline arrow #2: Center circle → Smartphone -->
      <image href="assets/light/arrow.svg"
             x="576.29" y="158.95" width="41.82" height="21.91"/>

      <!-- "IN" invoice slips — light variant (soft grey) -->
      <image href="assets/light/invoices.svg"
             x="411" y="38" width="108" height="106"/>

      <!-- CENTER: download circle — WHITE fill, soft stroke -->
      <g filter="url(#cyanGlow)">
        <circle cx="465.63" cy="171.55" r="80.62"
                fill="#ffffff" stroke="#dde1ea" stroke-width="3"/>
      </g>

      <!-- CENTER: download arrow icon inside the circle -->
      <path fill="#4499d1" d="M465.63,122.19 c-27.25,0-49.36,22.11-49.36,49.36
                              s22.11,49.36,49.36,49.36 s49.36-22.11,49.36-49.36
                              s-22.11-49.36-49.36-49.36 z
                              M465.63,209.77 c-21.08,0-38.22-17.14-38.22-38.22
                              c0-19.16,14.16-35.06,32.56-37.8 v44.96
                              l-15.08-14.96 v17.31 l20.57,20.57 l20.74-20.57
                              v-17.48 l-15.34,15.21 v-45.1
                              c18.61,2.56,32.99,18.55,32.99,37.85
                              c0,21.08-17.14,38.22-38.22,38.22 z"/>

      <!-- Left sync bubble — light variant (cyan-filled circle) -->
      <g filter="url(#cyanGlowStrong)">
        <image href="assets/light/return-arrow.svg"
               x="347.64" y="143.73" width="51.93" height="51.93"/>
      </g>

      <!-- Right sync bubble -->
      <g filter="url(#cyanGlowStrong)">
        <image href="assets/light/return-arrow.svg"
               x="531.71" y="143.73" width="51.93" height="51.93"/>
      </g>

      <!--
        LEFT: portal box with dashed border.
        Light variant: NO fill (transparent), soft stroke.
      -->
      <rect x="65.31" y="58.28" width="226.54" height="226.54"
            rx="14.17" ry="14.17"
            fill="none"
            stroke="#dde1ea" stroke-width="2.85"
            stroke-dasharray="8,4"/>

      <!-- LEFT: inner white box (visually contains the DHL logo) -->
      <g filter="url(#cyanGlow)">
        <rect x="112.67" y="105.64" width="131.82" height="131.82"
              rx="8.25" ry="8.25"
              fill="#ffffff"
              stroke="#dde1ea" stroke-width="2.85"/>
      </g>

      <!--
        LEFT: DHL logo centered on the inner white box.

        ★ DYNAMIC SWAP TARGET ★
        This logo is intended to change per portal subpage:
          /amazon  → amazon logo here
          /google  → google logo here
          etc.

        In the production templating system (Hugo / Lovable / React), replace
        the static src with a page-level parameter, e.g.:

          Hugo:    <image href="{{ .Params.portalLogo | default "assets/common/dhl.png" }}" ...
          React:   <image href={portalLogo || "/assets/common/dhl.png"} ...

        For global swap (one logo for all pages): just replace the file at
        assets/common/dhl.png — no code change needed.
      -->
      <image href="assets/common/dhl.png" x="128.5" y="154" width="100" height="35"
             preserveAspectRatio="xMidYMid meet"/>

    </svg>


    <!-- Drag hitzone (see script.js → "Orbit drag" section) -->
    <div class="orbit-hitzone" aria-hidden="true"></div>


    <!-- ═══════════════════════════════════════════════════════════════════
         8 PORTAL LOGOS — animated along the rectangular path
         (shared with the dark variant; logos come from /assets/common/)
         ═══════════════════════════════════════════════════════════════════ -->
    <div class="logos-orbit">
      <div class="logo-anchor" style="--start-frac: 0.05;">
        <div class="logo-box"><img src="assets/common/google.svg" alt="Google"></div>
      </div>
      <div class="logo-anchor" style="--start-frac: 0.174;">
        <div class="logo-box"><img src="assets/common/facebook.svg" alt="Facebook"></div>
      </div>
      <div class="logo-anchor" style="--start-frac: 0.30;">
        <div class="logo-box"><img src="assets/common/adobe.svg" alt="Adobe"></div>
      </div>
      <div class="logo-anchor" style="--start-frac: 0.424;">
        <div class="logo-box"><img src="assets/common/google.svg" alt="Google"></div>
      </div>
      <div class="logo-anchor" style="--start-frac: 0.55;">
        <div class="logo-box"><img src="assets/common/spotify.svg" alt="Spotify"></div>
      </div>
      <div class="logo-anchor" style="--start-frac: 0.674;">
        <div class="logo-box"><img src="assets/common/vodafone.svg" alt="Vodafone"></div>
      </div>
      <div class="logo-anchor" style="--start-frac: 0.80;">
        <div class="logo-box"><img src="assets/common/openai.svg" alt="OpenAI"></div>
      </div>
      <div class="logo-anchor" style="--start-frac: 0.924;">
        <div class="logo-box"><img src="assets/common/amazon.svg" alt="Amazon"></div>
      </div>
    </div>


    <!-- ═══════════════════════════════════════════════════════════════════
         SMARTPHONE CONTENT — infinite scroll of accounting export targets
         Light variant uses the BLACK versions of Lexware/Addison/FastBill
         (visible on the white phone background). DATEV is shared.
         Add/remove must happen in BOTH the original + duplicate set.
         ═══════════════════════════════════════════════════════════════════ -->
    <div class="phone-content">
      <div class="phone-scroll">
        <img src="assets/light/lexware-office.png" alt="Lexware Office">
        <img src="assets/common/datev.png"         alt="DATEV">
        <img src="assets/light/addison.png"        alt="Addison">
        <img src="assets/light/fastbill.png"       alt="FastBill">
        <!-- Loop duplicate (must mirror the original set) -->
        <img src="assets/light/lexware-office.png" alt="" aria-hidden="true">
        <img src="assets/common/datev.png"         alt="" aria-hidden="true">
        <img src="assets/light/addison.png"        alt="" aria-hidden="true">
        <img src="assets/light/fastbill.png"       alt="" aria-hidden="true">
      </div>
    </div>

  </div>


  <!-- Animation loop + drag/wheel interactions — see script.js -->
  <script src="script.js"></script>

</body>
</html>
