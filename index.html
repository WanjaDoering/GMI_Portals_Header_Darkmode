<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GetMyInvoices Header — Portal-Verbindungen</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!--
    GetMyInvoices Website-Header — Animierte Komposition
    ─────────────────────────────────────────────────────
    LINKS    Portal-Box mit 8 Logos, die entlang des Rahmens wandern.
    MITTE    Sync-Center mit Download-Symbol, "IN"-Belegen und Refresh-Bubbles.
    RECHTS   Smartphone mit Endlos-Scroll der Export-Ziele.

    Logo-Tausch: einfach Datei in /assets ersetzen ODER `<img src="…">`-
    Pfad anpassen. SVG, PNG, JPG, WEBP — alle Formate funktionieren.
  -->

  <div class="header-graphic anim-on">

    <!-- ═══════════════════════════════════════════════════════════
         INLINE-SVG: statische Komposition (Box, Center, Smartphone)
         viewBox 824×344 — entspricht der Original-Designvorlage.
         ═══════════════════════════════════════════════════════════ -->
    <svg class="bg-svg" viewBox="0 0 824.38 344" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
      <defs>

        <!-- Verlauf für Portal-Box und Center-Kreis -->
        <linearGradient id="bgGradient" x1="0" y1="0" x2="1" y2="1">
          <stop offset="0%"   stop-color="#000000"/>
          <stop offset="24%"  stop-color="#082540"/>
          <stop offset="46%"  stop-color="#082540"/>
          <stop offset="100%" stop-color="#000000"/>
        </linearGradient>

        <!-- Cyan-Glow (für Box, Center, Smartphone) -->
        <filter id="cyanGlow" x="-50%" y="-50%" width="200%" height="200%">
          <feGaussianBlur in="SourceAlpha" stdDeviation="12" result="blur"/>
          <feFlood flood-color="#44A4DC" flood-opacity="0.95" result="color"/>
          <feComposite in="color" in2="blur" operator="in" result="coloredBlur"/>
          <feMerge>
            <feMergeNode in="coloredBlur"/>
            <feMergeNode in="SourceGraphic"/>
          </feMerge>
        </filter>

        <!-- Stärkerer Cyan-Glow (für Sync-Bubbles) -->
        <filter id="cyanGlowStrong" x="-100%" y="-100%" width="300%" height="300%">
          <feGaussianBlur in="SourceAlpha" stdDeviation="18" result="blur"/>
          <feFlood flood-color="#44A4DC" flood-opacity="1" result="color"/>
          <feComposite in="color" in2="blur" operator="in" result="coloredBlur"/>
          <feMerge>
            <feMergeNode in="coloredBlur"/>
            <feMergeNode in="SourceGraphic"/>
          </feMerge>
        </filter>

      </defs>

      <!-- Smartphone (rechts) -->
      <g filter="url(#cyanGlow)">
        <rect x="640.54" y="55.31" width="137.67" height="236.53"
              rx="11.29" ry="11.29"
              fill="#060608" stroke="#3c6e9d" stroke-width="2.85"/>
      </g>

      <!-- Pfeil: Portal-Box → Center-Kreis -->
      <g fill="#fff">
        <path d="M 286.6 174.19 L 319.55 174.00
                 a 3.95 3.95 0 0 0 3.92 -3.97 v -0.68
                 a 3.95 3.95 0 0 0 -3.97 -3.92 L 286.55 165.62
                 a 3.95 3.95 0 0 0 -3.92 3.97 v 0.68
                 a 3.95 3.95 0 0 0 3.97 3.92 z"/>
        <path d="M 322.22 159.07 l 9.79 9.2 a 1.94 1.94 0 0 1 0 2.82
                 l -9.79 9.2 a 1.27 1.27 0 0 1 -1.75 0
                 a 1.13 1.13 0 0 1 -0.36 -0.82 v -19.59
                 a 1.16 1.16 0 0 1 1.24 -1.16
                 a 1.27 1.27 0 0 1 0.87 0.34"/>
      </g>

      <!-- Pfeil: Center-Kreis → Smartphone -->
      <g fill="#fff">
        <path d="M 576.29 174.19 L 609.24 174.00
                 a 3.95 3.95 0 0 0 3.92 -3.97 v -0.68
                 a 3.95 3.95 0 0 0 -3.97 -3.92 L 576.24 165.62
                 a 3.95 3.95 0 0 0 -3.92 3.97 v 0.68
                 a 3.95 3.95 0 0 0 3.97 3.92 z"/>
        <path d="M 611.91 159.07 l 9.79 9.2 a 1.94 1.94 0 0 1 0 2.82
                 l -9.79 9.2 a 1.27 1.27 0 0 1 -1.75 0
                 a 1.13 1.13 0 0 1 -0.36 -0.82 v -19.59
                 a 1.16 1.16 0 0 1 1.24 -1.16
                 a 1.27 1.27 0 0 1 0.87 0.34"/>
      </g>

      <!-- "IN"-Belege (Original-SVG vom Designer) -->
      <image href="assets/invoices.svg" x="411" y="38" width="108" height="106"/>

      <!-- Center: Großer Kreis mit Verlauf + Glow -->
      <g filter="url(#cyanGlow)">
        <circle cx="465.63" cy="171.55" r="80.62"
                fill="url(#bgGradient)" stroke="#3c6e9d" stroke-width="3"/>
      </g>

      <!-- Center: Download-Pfeil-Icon im Kreis -->
      <path fill="#4499d1" d="M465.63,122.19 c-27.25,0-49.36,22.11-49.36,49.36
                              s22.11,49.36,49.36,49.36 s49.36-22.11,49.36-49.36
                              s-22.11-49.36-49.36-49.36 z
                              M465.63,209.77 c-21.08,0-38.22-17.14-38.22-38.22
                              c0-19.16,14.16-35.06,32.56-37.8 v44.96
                              l-15.08-14.96 v17.31 l20.57,20.57 l20.74-20.57
                              v-17.48 l-15.34,15.21 v-45.1
                              c18.61,2.56,32.99,18.55,32.99,37.85
                              c0,21.08-17.14,38.22-38.22,38.22 z"/>

      <!-- Linke Sync-Bubble (Refresh-Symbol mit Glow) -->
      <g filter="url(#cyanGlowStrong)">
        <image href="assets/return-arrow.svg" x="347.64" y="143.73" width="51.93" height="51.93"/>
      </g>

      <!-- Rechte Sync-Bubble -->
      <g filter="url(#cyanGlowStrong)">
        <image href="assets/return-arrow.svg" x="531.71" y="143.73" width="51.93" height="51.93"/>
      </g>

      <!-- Linke Portal-Box (gradient + dashed border) -->
      <rect x="65.31" y="58.28" width="226.54" height="226.54"
            rx="14.17" ry="14.17"
            fill="url(#bgGradient)"
            stroke="#3c6e9d" stroke-width="2.85"
            stroke-dasharray="8,4"/>

      <!-- Inneres weißes Quadrat -->
      <g filter="url(#cyanGlow)">
        <rect x="112.67" y="105.64" width="131.82" height="131.82"
              rx="8.25" ry="8.25"
              fill="#fff"
              stroke="#3c6e9d" stroke-width="2.85"/>
      </g>

      <!-- DHL-Logo zentriert auf der inneren weißen Box -->
      <image href="assets/dhl.png" x="128.5" y="154" width="100" height="35"
             preserveAspectRatio="xMidYMid meet"/>

    </svg>


    <!-- ═══════════════════════════════════════════════════════════
         8 PORTAL-LOGOS — wandern auf dem Rechteck-Pfad
         Ankerpunkt der Logos: Mittelpunkt der Portal-Box.
         Initial-Position auf dem Pfad: --start-frac (0 bis 1).
         Logo-Datei austauschen: einfach `src=` ändern.
         ═══════════════════════════════════════════════════════════ -->
    <div class="logos-orbit">
      <div class="logo-anchor" style="--start-frac: 0.05;">
        <div class="logo-box"><img src="assets/google.svg" alt="Google"></div>
      </div>
      <div class="logo-anchor" style="--start-frac: 0.174;">
        <div class="logo-box"><img src="assets/facebook.svg" alt="Facebook"></div>
      </div>
      <div class="logo-anchor" style="--start-frac: 0.30;">
        <div class="logo-box"><img src="assets/adobe.svg" alt="Adobe"></div>
      </div>
      <div class="logo-anchor" style="--start-frac: 0.424;">
        <div class="logo-box"><img src="assets/google.svg" alt="Google"></div>
      </div>
      <div class="logo-anchor" style="--start-frac: 0.55;">
        <div class="logo-box"><img src="assets/spotify.svg" alt="Spotify"></div>
      </div>
      <div class="logo-anchor" style="--start-frac: 0.674;">
        <div class="logo-box"><img src="assets/vodafone.svg" alt="Vodafone"></div>
      </div>
      <div class="logo-anchor" style="--start-frac: 0.80;">
        <div class="logo-box"><img src="assets/openai.svg" alt="OpenAI"></div>
      </div>
      <div class="logo-anchor" style="--start-frac: 0.924;">
        <div class="logo-box"><img src="assets/amazon.svg" alt="Amazon"></div>
      </div>
    </div>


    <!-- ═══════════════════════════════════════════════════════════
         SMARTPHONE-INHALT — Endlos-Scroll der Export-Ziele
         Logo-Reihenfolge im Original + Duplikat für nahtlosen Loop.
         Beim Hinzufügen weiterer Exporte: in BEIDEN Sets ergänzen.
         ═══════════════════════════════════════════════════════════ -->
    <div class="phone-content">
      <div class="phone-scroll">
        <img src="assets/lexware-office.png" alt="Lexware Office">
        <img src="assets/datev.png"          alt="DATEV">
        <img src="assets/addison.png"        alt="Addison">
        <img src="assets/fastbill.png"       alt="FastBill">
        <!-- Duplikat für seamless loop — synchron mit Originalen halten -->
        <img src="assets/lexware-office.png" alt="" aria-hidden="true">
        <img src="assets/datev.png"          alt="" aria-hidden="true">
        <img src="assets/addison.png"        alt="" aria-hidden="true">
        <img src="assets/fastbill.png"       alt="" aria-hidden="true">
      </div>
    </div>

  </div>

</body>
</html>
