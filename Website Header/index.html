<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="color-scheme" content="dark light">
  <title>GetMyInvoices Header — Dark</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!--
    ═══════════════════════════════════════════════════════════════════════════
    GetMyInvoices Website Header — DARK variant
    ───────────────────────────────────────────────────────────────────────────
    Animated composition with three regions:

      LEFT    Portal box with 8 logos orbiting along the dashed border path.
      CENTER  Sync center with download icon, "IN" invoice slips, sync bubbles.
      RIGHT   Smartphone with infinite-scroll list of accounting export targets.

    THEME LOGIC
    The DARK variant uses this file (no body class).
    The LIGHT variant lives in index-light.html (body.light) and re-uses the
    same style.css + script.js. The only structural differences are:
      - Background colors of phone, center circle, portal box
      - Stroke colors
      - Inline "arrow between boxes" graphic (swapped for assets/light/arrow.svg)
      - Center "IN" slips graphic (swapped for assets/light/invoices.svg)
      - Sync bubble graphic (swapped for assets/light/return-arrow.svg)
      - Phone-scroll logos (swapped for black variants in assets/light/)

    ASSET ORGANIZATION
    /assets/common/   shared by both variants (portal logos, DHL, DATEV)
    /assets/dark/     dark-only graphics (invoices, return-arrow, phone logos)
    /assets/light/    light-only graphics (same filenames as dark/, different fills)

    COMMON CUSTOMIZATIONS
    ─ Swap a logo:           replace the file at the same path, no code change.
    ─ Animation speed:       edit :root variables in style.css.
    ─ Add/remove phone logo: add/remove <img> in BOTH .phone-scroll blocks
                             (original + duplicate set — they must stay in sync
                             for the seamless loop).
    ═══════════════════════════════════════════════════════════════════════════
  -->

  <div class="header-graphic">

    <!-- ═══════════════════════════════════════════════════════════════════
         INLINE SVG — static composition of the three regions
         viewBox 824 × 344 matches the original design canvas.
         ═══════════════════════════════════════════════════════════════════ -->
    <svg class="bg-svg" viewBox="0 0 824.38 344"
         xmlns="http://www.w3.org/2000/svg" aria-hidden="true">

      <defs>
        <!-- Gradient used by the portal box and the center circle -->
        <linearGradient id="bgGradient" x1="0" y1="0" x2="1" y2="1">
          <stop offset="0%"   stop-color="#000000"/>
          <stop offset="24%"  stop-color="#082540"/>
          <stop offset="46%"  stop-color="#082540"/>
          <stop offset="100%" stop-color="#000000"/>
        </linearGradient>

        <!-- Standard cyan glow — used for phone, center circle, inner DHL box -->
        <filter id="cyanGlow" x="-50%" y="-50%" width="200%" height="200%">
          <feGaussianBlur in="SourceAlpha" stdDeviation="12" result="blur"/>
          <feFlood flood-color="#44A4DC" flood-opacity="0.95" result="color"/>
          <feComposite in="color" in2="blur" operator="in" result="coloredBlur"/>
          <feMerge>
            <feMergeNode in="coloredBlur"/>
            <feMergeNode in="SourceGraphic"/>
          </feMerge>
        </filter>

        <!-- Stronger cyan glow — used for the two sync bubbles -->
        <filter id="cyanGlowStrong" x="-100%" y="-100%" width="300%" height="300%">
          <feGaussianBlur in="SourceAlpha" stdDeviation="18" result="blur"/>
          <feFlood flood-color="#44A4DC" flood-opacity="1" result="color"/>
          <feComposite in="color" in2="blur" operator="in" result="coloredBlur"/>
          <feMerge>
            <feMergeNode in="coloredBlur"/>
            <feMergeNode in="SourceGraphic"/>
          </feMerge>
        </filter>
      </defs>

      <!-- RIGHT: smartphone background rectangle -->
      <g filter="url(#cyanGlow)">
        <rect x="640.54" y="55.31" width="137.67" height="236.53"
              rx="11.29" ry="11.29"
              fill="#060608" stroke="#3c6e9d" stroke-width="2.85"/>
      </g>

      <!-- Inline arrow #1: Portal box → Center circle -->
      <g fill="#fff">
        <path d="M 286.6 174.19 L 319.55 174.00
                 a 3.95 3.95 0 0 0 3.92 -3.97 v -0.68
                 a 3.95 3.95 0 0 0 -3.97 -3.92 L 286.55 165.62
                 a 3.95 3.95 0 0 0 -3.92 3.97 v 0.68
                 a 3.95 3.95 0 0 0 3.97 3.92 z"/>
        <path d="M 322.22 159.07 l 9.79 9.2 a 1.94 1.94 0 0 1 0 2.82
                 l -9.79 9.2 a 1.27 1.27 0 0 1 -1.75 0
                 a 1.13 1.13 0 0 1 -0.36 -0.82 v -19.59
                 a 1.16 1.16 0 0 1 1.24 -1.16
                 a 1.27 1.27 0 0 1 0.87 0.34"/>
      </g>

      <!-- Inline arrow #2: Center circle → Smartphone -->
      <g fill="#fff">
        <path d="M 576.29 174.19 L 609.24 174.00
                 a 3.95 3.95 0 0 0 3.92 -3.97 v -0.68
                 a 3.95 3.95 0 0 0 -3.97 -3.92 L 576.24 165.62
                 a 3.95 3.95 0 0 0 -3.92 3.97 v 0.68
                 a 3.95 3.95 0 0 0 3.97 3.92 z"/>
        <path d="M 611.91 159.07 l 9.79 9.2 a 1.94 1.94 0 0 1 0 2.82
                 l -9.79 9.2 a 1.27 1.27 0 0 1 -1.75 0
                 a 1.13 1.13 0 0 1 -0.36 -0.82 v -19.59
                 a 1.16 1.16 0 0 1 1.24 -1.16
                 a 1.27 1.27 0 0 1 0.87 0.34"/>
      </g>

      <!-- "IN" invoice slips on top of the center circle -->
      <image href="assets/dark/invoices.svg" x="411" y="38" width="108" height="106"/>

      <!-- CENTER: large download circle with gradient + glow -->
      <g filter="url(#cyanGlow)">
        <circle cx="465.63" cy="171.55" r="80.62"
                fill="url(#bgGradient)" stroke="#3c6e9d" stroke-width="3"/>
      </g>

      <!-- CENTER: download arrow icon inside the circle -->
      <path fill="#4499d1" d="M465.63,122.19 c-27.25,0-49.36,22.11-49.36,49.36
                              s22.11,49.36,49.36,49.36 s49.36-22.11,49.36-49.36
                              s-22.11-49.36-49.36-49.36 z
                              M465.63,209.77 c-21.08,0-38.22-17.14-38.22-38.22
                              c0-19.16,14.16-35.06,32.56-37.8 v44.96
                              l-15.08-14.96 v17.31 l20.57,20.57 l20.74-20.57
                              v-17.48 l-15.34,15.21 v-45.1
                              c18.61,2.56,32.99,18.55,32.99,37.85
                              c0,21.08-17.14,38.22-38.22,38.22 z"/>

      <!-- Left sync bubble (return-arrow with strong glow) -->
      <g filter="url(#cyanGlowStrong)">
        <image href="assets/dark/return-arrow.svg"
               x="347.64" y="143.73" width="51.93" height="51.93"/>
      </g>

      <!-- Right sync bubble -->
      <g filter="url(#cyanGlowStrong)">
        <image href="assets/dark/return-arrow.svg"
               x="531.71" y="143.73" width="51.93" height="51.93"/>
      </g>

      <!-- LEFT: portal box with dashed border, holds the orbiting logos -->
      <rect x="65.31" y="58.28" width="226.54" height="226.54"
            rx="14.17" ry="14.17"
            fill="url(#bgGradient)"
            stroke="#3c6e9d" stroke-width="2.85"
            stroke-dasharray="8,4"/>

      <!-- LEFT: inner white box (visually contains the DHL logo) -->
      <g filter="url(#cyanGlow)">
        <rect x="112.67" y="105.64" width="131.82" height="131.82"
              rx="8.25" ry="8.25"
              fill="#fff"
              stroke="#3c6e9d" stroke-width="2.85"/>
      </g>

      <!-- LEFT: DHL logo centered on the inner white box -->
      <image href="assets/common/dhl.png" x="128.5" y="154" width="100" height="35"
             preserveAspectRatio="xMidYMid meet"/>

    </svg>


    <!--
      Drag hitzone — invisible square positioned over the portal box.
      Captures mouse/touch events for the orbit drag interaction.
      See script.js → "Orbit drag" section for the interaction logic.
    -->
    <div class="orbit-hitzone" aria-hidden="true"></div>


    <!-- ═══════════════════════════════════════════════════════════════════
         8 PORTAL LOGOS — animated along the rectangular path
         Each .logo-anchor is positioned by CSS offset-path. Its starting
         position on the path is set inline via --start-frac (0.0 to 1.0).
         The actual rotation animation is driven by script.js.

         To swap a logo: replace the src attribute (or replace the file
         at assets/common/<filename> if you want both variants updated).
         ═══════════════════════════════════════════════════════════════════ -->
    <div class="logos-orbit">
      <div class="logo-anchor" style="--start-frac: 0.05;">
        <div class="logo-box"><img src="assets/common/google.svg" alt="Google"></div>
      </div>
      <div class="logo-anchor" style="--start-frac: 0.174;">
        <div class="logo-box"><img src="assets/common/facebook.svg" alt="Facebook"></div>
      </div>
      <div class="logo-anchor" style="--start-frac: 0.30;">
        <div class="logo-box"><img src="assets/common/adobe.svg" alt="Adobe"></div>
      </div>
      <div class="logo-anchor" style="--start-frac: 0.424;">
        <div class="logo-box"><img src="assets/common/google.svg" alt="Google"></div>
      </div>
      <div class="logo-anchor" style="--start-frac: 0.55;">
        <div class="logo-box"><img src="assets/common/spotify.svg" alt="Spotify"></div>
      </div>
      <div class="logo-anchor" style="--start-frac: 0.674;">
        <div class="logo-box"><img src="assets/common/vodafone.svg" alt="Vodafone"></div>
      </div>
      <div class="logo-anchor" style="--start-frac: 0.80;">
        <div class="logo-box"><img src="assets/common/openai.svg" alt="OpenAI"></div>
      </div>
      <div class="logo-anchor" style="--start-frac: 0.924;">
        <div class="logo-box"><img src="assets/common/amazon.svg" alt="Amazon"></div>
      </div>
    </div>


    <!-- ═══════════════════════════════════════════════════════════════════
         SMARTPHONE CONTENT — infinite scroll of accounting export targets
         The block contains the original 4 logos + an identical duplicate set
         to enable a seamless scroll loop. Both sets MUST stay in sync —
         when adding/removing logos, edit both halves.
         ═══════════════════════════════════════════════════════════════════ -->
    <div class="phone-content">
      <div class="phone-scroll">
        <img src="assets/dark/lexware-office.png" alt="Lexware Office">
        <img src="assets/common/datev.png"        alt="DATEV">
        <img src="assets/dark/addison.png"        alt="Addison">
        <img src="assets/dark/fastbill.png"       alt="FastBill">
        <!-- Loop duplicate (must mirror the original set) -->
        <img src="assets/dark/lexware-office.png" alt="" aria-hidden="true">
        <img src="assets/common/datev.png"        alt="" aria-hidden="true">
        <img src="assets/dark/addison.png"        alt="" aria-hidden="true">
        <img src="assets/dark/fastbill.png"       alt="" aria-hidden="true">
      </div>
    </div>

  </div>


  <!-- Animation loop + drag/wheel interactions — see script.js -->
  <script src="script.js"></script>

</body>
</html>
